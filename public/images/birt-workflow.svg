<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 850" fill="none">
  <defs>
    <linearGradient id="tubeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5DE8D8"/>
      <stop offset="100%" stop-color="#3BBCE0"/>
    </linearGradient>
    <linearGradient id="primerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3ECDC6"/>
      <stop offset="100%" stop-color="#44B6E9"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a4a4e"/>
      <stop offset="100%" stop-color="#1e3a40"/>
    </linearGradient>
  </defs>

  <!-- Test Tube 1 -->
  <g transform="translate(70, 30)">
    <rect x="12" y="0" width="36" height="8" rx="2" fill="#8af0e4" opacity="0.6"/>
    <rect x="8" y="8" width="44" height="6" rx="1" fill="#555" opacity="0.3"/>
    <rect x="12" y="14" width="36" height="80" rx="4" fill="url(#tubeGrad)" opacity="0.85"/>
    <rect x="16" y="20" width="6" height="50" rx="2" fill="#fff" opacity="0.15"/>
    <path d="M12 94 L18 108 Q30 116 42 108 L48 94" fill="url(#tubeGrad)" opacity="0.85"/>
  </g>

  <!-- Test Tube 2 -->
  <g transform="translate(220, 30)">
    <rect x="12" y="0" width="36" height="8" rx="2" fill="#8af0e4" opacity="0.6"/>
    <rect x="8" y="8" width="44" height="6" rx="1" fill="#555" opacity="0.3"/>
    <rect x="12" y="14" width="36" height="80" rx="4" fill="url(#tubeGrad)" opacity="0.85"/>
    <rect x="16" y="20" width="6" height="50" rx="2" fill="#fff" opacity="0.15"/>
    <path d="M12 94 L18 108 Q30 116 42 108 L48 94" fill="url(#tubeGrad)" opacity="0.85"/>
  </g>

  <!-- Dots (...) -->
  <circle cx="335" cy="85" r="4" fill="#5DE8D8"/>
  <circle cx="350" cy="85" r="4" fill="#5DE8D8"/>
  <circle cx="365" cy="85" r="4" fill="#5DE8D8"/>

  <!-- Test Tube 3 -->
  <g transform="translate(380, 30)">
    <rect x="12" y="0" width="36" height="8" rx="2" fill="#8af0e4" opacity="0.6"/>
    <rect x="8" y="8" width="44" height="6" rx="1" fill="#555" opacity="0.3"/>
    <rect x="12" y="14" width="36" height="80" rx="4" fill="url(#tubeGrad)" opacity="0.85"/>
    <rect x="16" y="20" width="6" height="50" rx="2" fill="#fff" opacity="0.15"/>
    <path d="M12 94 L18 108 Q30 116 42 108 L48 94" fill="url(#tubeGrad)" opacity="0.85"/>
  </g>

  <!-- Labels under tubes -->
  <text x="100" y="175" text-anchor="middle" fill="#ffffff" font-family="Manrope, sans-serif" font-size="14" font-weight="500">Total RNA</text>
  <text x="100" y="193" text-anchor="middle" fill="#ffffff" font-family="Manrope, sans-serif" font-size="14" font-weight="500">Sample 1</text>

  <text x="250" y="175" text-anchor="middle" fill="#ffffff" font-family="Manrope, sans-serif" font-size="14" font-weight="500">Total RNA</text>
  <text x="250" y="193" text-anchor="middle" fill="#ffffff" font-family="Manrope, sans-serif" font-size="14" font-weight="500">Sample 2</text>

  <text x="410" y="175" text-anchor="middle" fill="#ffffff" font-family="Manrope, sans-serif" font-size="14" font-weight="500">Total RNA</text>
  <text x="410" y="193" text-anchor="middle" fill="#ffffff" font-family="Manrope, sans-serif" font-size="14" font-weight="500">Sample 96</text>

  <!-- Down arrows before BIRT Primer -->
  <polygon points="95,215 100,225 105,215" fill="#3ECDC6"/>
  <polygon points="95,228 100,238 105,228" fill="#3ECDC6"/>

  <!-- BIRT Primer Bar -->
  <rect x="50" y="245" width="420" height="50" rx="25" fill="url(#primerGrad)" opacity="0.35"/>
  <rect x="50" y="245" width="420" height="50" rx="25" stroke="#3ECDC6" stroke-width="1.5" fill="none"/>
  <text x="260" y="276" text-anchor="middle" fill="#ffffff" font-family="Manrope, sans-serif" font-size="18" font-weight="700">BIRT Primer</text>

  <!-- Chevrons on BIRT Primer bar -->
  <polygon points="75,260 82,270 75,280" fill="#3ECDC6"/>
  <polygon points="438,260 445,270 438,280" fill="#3ECDC6"/>

  <!-- Down arrows after BIRT Primer -->
  <polygon points="95,305 100,315 105,305" fill="#3ECDC6"/>
  <polygon points="95,318 100,328 105,318" fill="#3ECDC6"/>

  <!-- cDNA labels -->
  <text x="100" y="360" text-anchor="middle" fill="#ffffff" font-family="Manrope, sans-serif" font-size="14" font-weight="500">cDNA1</text>
  <text x="250" y="360" text-anchor="middle" fill="#ffffff" font-family="Manrope, sans-serif" font-size="14" font-weight="500">cDNA2</text>
  <text x="410" y="360" text-anchor="middle" fill="#ffffff" font-family="Manrope, sans-serif" font-size="14" font-weight="500">cDNA96</text>

  <!-- cDNA connection dots -->
  <circle cx="100" cy="380" r="4" fill="#3ECDC6"/>
  <circle cx="250" cy="380" r="4" fill="#3ECDC6"/>
  <circle cx="410" cy="380" r="4" fill="#3ECDC6"/>

  <!-- Vertical lines from dots -->
  <line x1="100" y1="384" x2="100" y2="430" stroke="#3ECDC6" stroke-width="1.5"/>
  <line x1="250" y1="384" x2="250" y2="430" stroke="#3ECDC6" stroke-width="1.5"/>
  <line x1="410" y1="384" x2="410" y2="430" stroke="#3ECDC6" stroke-width="1.5"/>

  <!-- Horizontal connecting line -->
  <line x1="100" y1="430" x2="410" y2="430" stroke="#3ECDC6" stroke-width="1.5"/>

  <!-- Dots between cDNA2 and cDNA96 -->
  <circle cx="335" cy="370" r="3" fill="#5DE8D8"/>
  <circle cx="345" cy="370" r="3" fill="#5DE8D8"/>
  <circle cx="355" cy="370" r="3" fill="#5DE8D8"/>

  <!-- Box outline for pooled -->
  <rect x="80" y="370" width="360" height="80" rx="8" stroke="#3ECDC6" stroke-width="1.5" fill="none" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Pooled Barcoded cDNA label -->
  <text x="260" y="485" text-anchor="middle" fill="#ffffff" font-family="Manrope, sans-serif" font-size="16" font-weight="700">Pooled Barcoded cDNA</text>

  <!-- Down arrow to NGS box -->
  <polygon points="255,505 260,515 265,505" fill="#3ECDC6"/>
  <polygon points="255,518 260,528 265,518" fill="#3ECDC6"/>

  <!-- NGS Library Preparation Box -->
  <rect x="80" y="545" width="360" height="150" rx="20" fill="url(#primerGrad)" opacity="0.25"/>
  <rect x="80" y="545" width="360" height="150" rx="20" stroke="#3ECDC6" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Chevrons inside NGS box - left side -->
  <polygon points="110,580 117,590 110,600" fill="#3ECDC6" opacity="0.7"/>
  <polygon points="110,610 117,620 110,630" fill="#3ECDC6" opacity="0.7"/>
  <polygon points="110,640 117,650 110,660" fill="#3ECDC6" opacity="0.7"/>

  <!-- Chevrons inside NGS box - right side -->
  <polygon points="420,580 413,590 420,600" fill="#3ECDC6" opacity="0.7"/>
  <polygon points="420,610 413,620 420,630" fill="#3ECDC6" opacity="0.7"/>
  <polygon points="420,640 413,650 420,660" fill="#3ECDC6" opacity="0.7"/>

  <!-- NGS box text -->
  <text x="260" y="608" text-anchor="middle" fill="#3ECDC6" font-family="Manrope, sans-serif" font-size="17" font-weight="700">Expensive and labor</text>
  <text x="260" y="632" text-anchor="middle" fill="#3ECDC6" font-family="Manrope, sans-serif" font-size="17" font-weight="700">intensive NGS library</text>
  <text x="260" y="656" text-anchor="middle" fill="#3ECDC6" font-family="Manrope, sans-serif" font-size="17" font-weight="700">preparation steps</text>

  <!-- NGS Library label -->
  <text x="260" y="735" text-anchor="middle" fill="#ffffff" font-family="Manrope, sans-serif" font-size="16" font-weight="700">NGS Library</text>
</svg>